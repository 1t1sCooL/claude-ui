name: Build & Deploy

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/1t1scool/claude-ui

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

      - name: Deploy to k8s
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > /tmp/kube.yaml
          export KUBECONFIG=/tmp/kube.yaml
          sed "s|IMAGE_TAG|${{ github.sha }}|g" k8s/deployment.yaml | kubectl apply -f -
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml
          kubectl rollout status deployment/claude-ui --timeout=120s
