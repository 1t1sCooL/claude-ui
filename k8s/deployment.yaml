apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-ui
  namespace: default
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: claude-ui
  template:
    metadata:
      labels:
        app: claude-ui
    spec:
      serviceAccountName: claude-ui-sa
      containers:
        - name: claude-ui
          image: ghcr.io/1t1scool/claude-ui:IMAGE_TAG
          ports:
            - containerPort: 8080
          env:
            - name: HOME
              value: /home/node
            - name: OBSIDIAN_PATH
              value: /home/node/obsidian
            - name: APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: claude-ui-secret
                  key: password
            - name: GIT_SSH_COMMAND
              value: ssh -o StrictHostKeyChecking=no
          volumeMounts:
            - name: claude-auth
              mountPath: /home/node/.claude
            - name: obsidian
              mountPath: /home/node/obsidian
            - name: ssh-keys
              mountPath: /home/node/.ssh
            - name: workspace
              mountPath: /home/node/workspace
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      volumes:
        - name: claude-auth
          hostPath:
            path: /home/node/.claude
            type: Directory
        - name: obsidian
          hostPath:
            path: /home/node/obsidian
            type: Directory
        - name: ssh-keys
          hostPath:
            path: /home/node/.ssh
            type: Directory
        - name: workspace
          hostPath:
            path: /home/node/workspace
            type: Directory
      imagePullSecrets:
        - name: ghcr-secret
