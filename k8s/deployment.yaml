apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-ui
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: claude-ui
  template:
    metadata:
      labels:
        app: claude-ui
    spec:
      containers:
        - name: claude-ui
          image: ghcr.io/1t1scool/claude-ui:IMAGE_TAG
          ports:
            - containerPort: 8080
          env:
            - name: HOME
              value: /home/node
          volumeMounts:
            - name: claude-auth
              mountPath: /home/node/.claude
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      volumes:
        - name: claude-auth
          hostPath:
            path: /home/node/.claude
            type: Directory
      imagePullSecrets:
        - name: ghcr-secret
